<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SCUB Bot Status</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg border-0 mx-3" style="max-width: 450px;">
            <div class="card-body text-center">
                
                <h1 class="card-title text-primary fw-bold mb-2">
                    🏐 Unibz Volley Bot
                </h1>
                
                <p class="card-text text-secondary m-0">
                    Your personal assistant for unibz sports bookings is currently running in the cloud.
                </p>
                
                <div class="alert alert-success rounded-pill d-flex align-items-center justify-content-center gap-2 my-3" role="alert" style="max-height: 38px;">
                    <div class="spinner-grow spinner-grow-sm text-success" role="status">
                        <span class="visually-hidden">Online</span>
                    </div>
                    <small class="fw-bold">System Online & Active</small>
                </div>

                <div class="m-0">
                    <a href="https://t.me/unibz_volley_bot" target="_blank" class="btn btn-outline-primary w-100 rounded-pill">
                        Open in Telegram
                    </a>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
